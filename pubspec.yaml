name: config_moodle
description: "Configurador de disciplinas Moodle com recálculo automático de datas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  http: ^1.4.0
  shared_preferences: ^2.5.3
  file_picker: ^8.3.7
  excel: ^4.0.6
  intl: ^0.20.2
  path: ^1.9.1
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  image_path: "assets/icone.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icone.png"

flutter:
  uses-material-design: true